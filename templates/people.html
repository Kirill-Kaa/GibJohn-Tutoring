{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Find People</h2>
        <p class="text-muted">Search and start conversations</p>
    </div>

    <!-- Search Bar -->
    <form method="GET" class="mb-4">
        <div class="input-group">
            <input type="text" name="q" class="form-control"
                   placeholder="Search by username..."
                   value="{{ request.args.get('q', '') }}">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <!-- Users List -->
    <div class="row">
        {% for user in users %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">

                    <h5 class="card-title">{{ user.username }}</h5>

                    <span class="badge 
                        {% if user.role == 'tutor' %}
                            bg-success
                        {% else %}
                            bg-secondary
                        {% endif %}
                    ">
                        {{ user.role|capitalize }}
                    </span>

                    <div class="mt-3">
                        <a href="{{ url_for('start_conversation', user_id=user.id) }}"
                           class="btn btn-outline-primary w-100">
                            💬 Start Chat
                        </a>
                    </div>

                </div>
            </div>
        </div>
        {% else %}
        <p>No users found.</p>
        {% endfor %}
    </div>

</div>

{% endblock %}
