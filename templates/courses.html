{% extends "base.html" %}
{% block title %}Assessments{% endblock %}
{% block content %}

<section class="container">
    <h1>Courses</h1>

    <ul class="list-group">
        {% for course in courses %}
        <li class="list-group-item list-group-item-action">
            <a  href="{{ url_for('course_detail', course_id=course.id) }}">
                {{ course.name }}
            </a>
        </li>
        {% endfor %}
    </ul>

</section>

{% endblock %}
