<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>{% block title %}{% endblock %}</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto nav-underline mr-2">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/resources">Resources</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/people">people</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/messages">Messages</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/courses">Courses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">My account</a>
                    </li>
                    {% if session.get('user_id') %}
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout ({{ session['username'] }})</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/register">Register</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    {% block content %}
    {% endblock %}

    <!-- Chat Button -->
    <div id="chatbot-button" class="position-fixed bottom-0 end-0 m-4">
        <button class="btn btn-primary rounded-circle shadow" onclick="toggleChat()"
            style="width:60px; height:60px; font-size:22px;">
            🤖
        </button>
    </div>

    <!-- Chat Window -->
    <div id="chatbot-window" class="card shadow position-fixed bottom-0 end-0 m-4" style="width:350px; display:none;">

        <div class="card-header bg-dark text-white d-flex justify-content-between">
            <span>AI Assistant</span>
            <button class="btn btn-sm btn-light" onclick="toggleChat()">X</button>
        </div>

        <div id="chatbot-messages" class="card-body" style="height:300px; overflow-y:auto;">
        </div>

        <div class="card-footer">
            <input type="text" id="chatbot-input" class="form-control" placeholder="Ask me anything..."
                onkeypress="handleKey(event)">
        </div>
    </div>

    <script>
        function toggleChat() {
            const chat = document.getElementById("chatbot-window");
            chat.style.display = chat.style.display === "none" ? "block" : "none";
        }

        function handleKey(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById("chatbot-input");
            const message = input.value.trim();
            if (!message) return;

            const messagesDiv = document.getElementById("chatbot-messages");

            messagesDiv.innerHTML += `
        <div class="mb-2">
            <strong>You:</strong> ${message}
        </div>
    `;

            fetch("/ai-chatbot", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            })
                .then(response => response.json())
                .then(data => {
                    messagesDiv.innerHTML += `
            <div class="mb-2 text-primary">
                <strong>AI:</strong> ${data.response}
            </div>
        `;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                });

            input.value = "";
        }
    </script>


    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll(".navbar-nav .nav-link");
            navLinks.forEach(link => {
                if (link.getAttribute("href") === currentPath) {
                    link.classList.add("active");
                }
            });
        });
    </script>
</body>

</html>
